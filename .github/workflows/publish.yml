name: Publish to npm

on:
    push:
        tags:
            - "v*"

jobs:
    publish:
        name: Publish packages
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build packages
              run: pnpm turbo build

            - name: Publish @ndnci/codabra
              run: |
                  PRERELEASE=$(echo "${{ github.ref_name }}" | sed -n 's/^v[0-9]*\.[0-9]*\.[0-9]*-\([a-zA-Z]*\).*/\1/p')
                  if [ -n "$PRERELEASE" ]; then
                    DIST_TAG="--tag $PRERELEASE"
                  else
                    DIST_TAG=""
                  fi
                  pnpm --filter @ndnci/codabra publish --access public --provenance --no-git-checks $DIST_TAG
